name: Mirror to Codeberg
on:
  push:
    branches: [main]
  workflow_dispatch:
  delete:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'sleuthy-sloth'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Codeberg
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          git fetch --unshallow 2>/dev/null || true
          git remote add codeberg https://codeberg.org/sleuthy-sloth/${{ github.event.repository.name }}.git
          git config --local http.https://codeberg.org/.extraheader "Authorization: basic $(echo -n "sleuthy-sloth:${CODEBERG_TOKEN}" | base64)"
          git push --force --all codeberg
          git push --force --tags codeberg
