name: Mirror to Codeberg
on:
  push:
    branches: [main]
  workflow_dispatch:
  delete:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'sleuthy-sloth'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Codeberg
        run: |
          git fetch --unshallow 2>/dev/null || true
          git remote add codeberg https://sleuthy-sloth:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/sleuthy-sloth/${{ github.event.repository.name }}.git
          git push --force --all codeberg
          git push --force --tags codeberg
