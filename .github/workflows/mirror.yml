name: Mirror to Codeberg
on:
  push:
    branches: [main, master]
  workflow_dispatch:
  delete:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'sleuthy-sloth'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Codeberg
        env:
          CB_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          REPO="${{ github.event.repository.name }}"
          git fetch --unshallow 2>/dev/null || true
          git remote add codeberg "https://codeberg.org/sleuthy-sloth/${REPO}.git"
          git -c http.extraheader="Authorization: basic $(echo -n sleuthy-sloth:${CB_TOKEN} | base64 -w0)" push --force --all codeberg
          git -c http.extraheader="Authorization: basic $(echo -n sleuthy-sloth:${CB_TOKEN} | base64 -w0)" push --force --tags codeberg
