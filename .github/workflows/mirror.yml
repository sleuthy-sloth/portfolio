name: Mirror to Codeberg
on:
  push:
    branches: [main, master]
  workflow_dispatch:
  delete:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'sleuthy-sloth'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Codeberg
        env:
          CB_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          REPO="${{ github.event.repository.name }}"
          git fetch --unshallow 2>/dev/null || true
          # Store credentials via git credential helper
          echo "url=https://codeberg.org" > /tmp/git-creds
          echo "username=sleuthy-sloth" >> /tmp/git-creds
          echo "password=${CB_TOKEN}" >> /tmp/git-creds
          echo "" >> /tmp/git-creds
          git credential approve < /tmp/git-creds
          # Now push using stored credentials  
          git remote add codeberg "https://codeberg.org/sleuthy-sloth/${REPO}.git"
          git push --force --all codeberg
          git push --force --tags codeberg
