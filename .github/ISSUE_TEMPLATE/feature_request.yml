name: Feature request
description: Suggest an improvement
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature or improvement.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why this would be valuable.
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: If you have an idea for how to implement it.
